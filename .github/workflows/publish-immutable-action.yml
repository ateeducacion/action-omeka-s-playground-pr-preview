# Disabled: actions/publish-immutable-action currently fails on every release
# with "DENIED - action package publishing is not enabled for this repository".
# GitHub's own docs for that action state immutable actions publishing is not
# yet rolled out for general use. Re-enable the `release: published` trigger
# once GitHub ships it. Manual runs still work via workflow_dispatch.
name: 'Publish Immutable Action Version'

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checking out
        uses: actions/checkout@v7
      - name: Publish
        id: publish
        uses: actions/publish-immutable-action@v0
