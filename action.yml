name: 'Omeka S Playground PR Preview'
description: 'Posts or updates a sticky PR comment with an Omeka S Playground preview link'
author: 'ateeducacion'

inputs:
  github-token:
    description: 'GitHub token with pull-requests:write permission'
    required: true
  zip-url:
    description: 'URL of the primary module or theme ZIP file to load in the playground'
    required: true
  addon-name:
    description: 'Optional explicit Omeka addon name for the primary ZIP. Recommended for GitHub archive URLs.'
    required: false
  addon-type:
    description: 'Type of the primary ZIP addon'
    required: false
    default: 'module'
  addon-state:
    description: 'State for the primary module ZIP. Ignored when addon-type is theme.'
    required: false
    default: 'activate'
  title:
    description: 'Title for the blueprint meta'
    required: false
    default: 'PR Preview'
  description:
    description: 'Description for the blueprint meta'
    required: false
    default: 'Preview this PR in Omeka S Playground'
  author:
    description: 'Author for the blueprint meta'
    required: false
    default: 'ateeducacion'
  playground-url:
    description: 'Base URL of the Omeka S Playground'
    required: false
    default: 'https://ateeducacion.github.io/omeka-s-playground/'
  image-url:
    description: 'URL of the image to display in the PR comment'
    required: false
    default: 'https://raw.githubusercontent.com/ateeducacion/omeka-s-playground/refs/heads/main/ogimage.png'
  comment-marker:
    description: 'Hidden HTML marker used to identify the sticky comment'
    required: false
    default: 'omeka-s-playground-preview'
  extra-modules:
    description: 'Optional JSON array of additional blueprint modules to append after the primary addon'
    required: false
  extra-themes:
    description: 'Optional JSON array of additional blueprint themes to append to the generated blueprint'
    required: false
  extra-plugins:
    description: 'Deprecated alias for extra-modules'
    required: false
  users-json:
    description: 'Optional JSON array for blueprint users'
    required: false
  item-sets-json:
    description: 'Optional JSON array for blueprint itemSets'
    required: false
  items-json:
    description: 'Optional JSON array for blueprint items'
    required: false
  site-json:
    description: 'Optional JSON object for blueprint site configuration'
    required: false
  landing-page:
    description: 'Optional landing page path to open inside Omeka S Playground'
    required: false
  debug-enabled:
    description: 'Optional boolean to enable or disable Playground debug mode'
    required: false
  site-title:
    description: 'Optional site title for the generated blueprint siteOptions'
    required: false
  site-locale:
    description: 'Optional locale for the generated blueprint siteOptions'
    required: false
  site-timezone:
    description: 'Optional timezone for the generated blueprint siteOptions'
    required: false
  login-email:
    description: 'Optional login email for the generated blueprint'
    required: false
  login-username:
    description: 'Deprecated alias for login-email'
    required: false
  login-password:
    description: 'Optional login password for the generated blueprint'
    required: false
  blueprint-json:
    description: 'Optional JSON object merged last into the generated blueprint to add or override advanced settings'
    required: false

outputs:
  preview-url:
    description: 'The full playground preview URL'

runs:
  using: 'node20'
  main: 'dist/index.cjs'
